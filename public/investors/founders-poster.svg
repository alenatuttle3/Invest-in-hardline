  <text x="640" y="392" text-anchor="middle" font-family="Montserrat, system-ui, sans-serif" font-size="26" font-weight="600" letter-spacing="6" fill="#6FC49F" opacity="0.85">THE FOUNDING STORY</text>
  <text x="640" y="436" text-anchor="middle" font-family="Montserrat, system-ui, sans-serif" font-size="20" font-weight="500" letter-spacing="1" fill="#7E908C">Alena &amp; Karly &#183; Co-founders</text>
